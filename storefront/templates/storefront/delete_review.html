{% extends 'base.html' %}
{% block title %}
	Delete Review
{% endblock %}
{% block content %}
	<h2>Are you sure you want to delete this review?</h2>
	<form method="post" action="{% url 'delete_review' pk=review.pk %}">
		{% csrf_token %}
		<button type="submit">Delete</button>
	</form>
	<a class="btn btn-secondary mt-2" href="{% url 'view_product' pk=review.product.pk %}">Back to Product Page</a>
{% endblock %}
