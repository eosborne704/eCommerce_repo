{% extends 'base.html' %}
{% load static %}
{% block head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'storefront/style.css' %}">
{% endblock %}

{% block title %}
    {{ page_title }}
{% endblock %}
{% block content %}
    <div class="container mt-4">
        <h2 class="mb-4">All Stores</h2>
        {% if is_vendor %}
            <a class="btn btn-primary mb-3" href="{% url 'create_store' %}">Create Store</a>
        {% endif %}
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
            {% for store in stores %}
                <div class="col">
                    <div class="card h-100 shadow-sm" style="min-width: 14rem;">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <a href="{% url 'view_store' pk=store.pk %}" class="btn btn-outline-success w-100 mb-2">{{ store.title }}</a>
                            <p class="text-muted">{{ store.blurb }}</p>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
