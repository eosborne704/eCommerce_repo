<!DOCTYPE html>
{% load static %}
{% block head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'storefront/style.css' %}">
{% endblock %}

{% block title %}
    Eli's Store {{ page_title }}
{% endblock %}
{% block content %}
    <h2>
        {{ page_title }}
    </h2>
    <ul>
        <a href="{% url 'create_store' %}">
            Create Store
        </a>
        {% for store in stores %}
            <li>
                <div class="card" style="height: 14.05rem;width: 14.05rem;">
                    <a href="{% url 'view_store' pk=store.pk %}">{{store.title}}</a>
                    <p>
                        {{ store.content }}
                    </p>
                </div>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
