{% extends 'base.html' %}
{% load static %}
{% block head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'storefront/style.css' %}">
{% endblock %}

{% block title %}
    {{ page_title }}
{% endblock %}
{% block content %}
    {% if is_vendor %}
        <a href="{% url 'create_store' %}">
            Create Store
        </a>
    {% endif %}
    <div class="container mt-4">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
            {% for store in stores %}
                <div class="col">
                    <div class="card h-100" style="min-width: 14rem;">
                        <a href="{% url 'view_store' pk=store.pk %}" class="card-title h5 mt-2">{{ store.title }}</a>
                        <div class="card-body">
                            <p>{{ store.blurb }}</p>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
