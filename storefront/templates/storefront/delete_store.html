{% extends "base.html" %}
{% block content %}
<h2>{{ store.title }}</h2>
<p>Are you sure you want to delete this store?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
    <a class="btn btn-secondary ms-2" href="{% url 'view_store' pk=store.pk %}">Cancel</a>
</form>
{% endblock %}
