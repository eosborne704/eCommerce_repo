{% load static %}
{% block head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'storefront/style.css' %}">
{% endblock %}

{% block title %}
    Eli's Store {{ store.title }}
{% endblock %}
{% block content %}
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card mb-4 text-center">
                    <div class="card-body">
                        <h2 class="card-title display-5">{{ store.title }}</h2>
                        <p class="card-text lead">{{ store.blurb }}</p>
                    </div>
                </div>
                <div class="d-grid gap-2">
                    <a class="btn btn-warning" href="{% url 'edit_store_details' pk=store.pk %}">Edit Store Details</a>
                    <a class="btn btn-danger" href="{% url 'delete_store' pk=store.pk %}">Delete Store</a>
                    <a class="btn btn-primary" href="{% url 'all_products' store_id=store.pk %}">All Products</a>
                    <a class="btn btn-secondary" href="{% url 'all_stores' %}">Back to Main Store Page</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
