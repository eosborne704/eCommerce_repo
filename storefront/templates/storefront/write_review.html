{% extends 'base.html' %}
{% load static %}
<!-- Add Bootstrap CDN to head -->
{% block head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'storefront/style.css' %}">
{% endblock %}

{% block title %}
	Write Review
{% endblock %}
{% block content %}
	<div class="container mt-4">
		<h2 class="mb-4">
			{% if form.instance.pk %}Edit{% else %}Write{% endif %} review
		</h2>
		<form method="post" enctype="multipart/form-data"
			action="{% if form.instance.pk %}{% url 'edit_review' pk=form.instance.pk %}{% else %}{% url 'write_review' product_id=product.pk %}{% endif %}">
			{% csrf_token %}
			<div class="card mb-3" style="max-width: 32rem;">
				<div class="card-body">
					{{ form.as_p}}
				</div>
			</div>
			<button class="btn btn-success" type="submit">Save</button>
		</form>
		<a class="btn btn-secondary mt-3" href="{% url 'all_reviews' product_id=product.pk %}">Back to Reviews</a>
	</div>
{% endblock %}
