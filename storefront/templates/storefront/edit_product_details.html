{% block title %}
    Edit Product
{% endblock %}
{% block content %}
    <h2>Edit product</h2>
    <form method="post" enctype="multipart/form-data"
        action="{% url 'edit_product_details' pk=form.instance.pk %}">
        {% csrf_token %}
        <div class="card" style="width: 25rem;">
            <div class="card-body">
                <p class="card-text">
                    {{ form.as_p}}
                </p>
            </div>
        </div>
        <button type="submit">
            Save
        </button>
    </form>
    <a href="{% url 'view_store' pk=form.instance.store.pk %}">Back to Store Page</a>
{% endblock %}
