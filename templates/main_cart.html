<h2>Your Shopping Cart</h2>

<table border="1">
    <thead>
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
        </tr>
    </thead>
    <tbody>
        {% for name, qty in cart.items %}
        <tr>
            <td>{{ name }}</td>
            <td>{{ qty }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">Your cart is empty!</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<br>
<a href="{% url 'home' %}">Back to Shop</a>
